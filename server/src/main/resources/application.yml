spring:
  config:
    import: optional:file:.env[.properties],optional:file:server/.env[.properties]

  application:
    name: server

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5434}/${POSTGRES_DB:tonton}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:anhquan}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:anhquandeptrai}}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    open-in-view: ${SPRING_JPA_OPEN_IN_VIEW:false}

app:
  auth:
    cookie:
      refresh-token-name: ${APP_AUTH_COOKIE_REFRESH_TOKEN_NAME:refresh_token}
      path: ${APP_AUTH_COOKIE_PATH:/}
      domain: ${APP_AUTH_COOKIE_DOMAIN:}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
      secure: ${APP_AUTH_COOKIE_SECURE:false}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Content-Type}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    max-age: ${APP_CORS_MAX_AGE:3600}
  jwt:
    secret: ${APP_JWT_SECRET:replace-this-with-a-long-random-secret-for-production-use-please-1234567890}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:2592000000}
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
    full-name: ${APP_BOOTSTRAP_ADMIN_FULL_NAME:Nguyen Cong Quan}
    phone-number: ${APP_BOOTSTRAP_ADMIN_PHONE_NUMBER:0345658495}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    default-folder: ${CLOUDINARY_DEFAULT_FOLDER:tonton}
